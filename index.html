<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TypeRacer Arena</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #ff006e;
            --secondary: #00f5d4;
            --accent: #fee440;
            --bg: #0d0221;
            --surface: #150734;
            --success: #00ff88;
            --error: #ff3366;
            --text: #ffffff;
        }

        body {
            font-family: 'Share Tech Mono', monospace;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 2px,
                    rgba(0, 0, 0, 0.1) 2px,
                    rgba(0, 0, 0, 0.1) 4px
                );
            pointer-events: none;
            z-index: 1000;
        }

        .grid-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 245, 212, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 245, 212, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridMove 20s linear infinite;
        }

        @keyframes gridMove {
            0% { transform: perspective(500px) rotateX(60deg) translateY(0); }
            100% { transform: perspective(500px) rotateX(60deg) translateY(50px); }
        }

        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .screen.active {
            opacity: 1;
            pointer-events: auto;
        }

        #start-screen {
            text-align: center;
        }

        .title {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(3rem, 10vw, 6rem);
            font-weight: 900;
            text-transform: uppercase;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 60px rgba(255, 0, 110, 0.5);
            animation: titlePulse 2s ease-in-out infinite;
            margin-bottom: 0.5rem;
        }

        @keyframes titlePulse {
            0%, 100% { filter: drop-shadow(0 0 20px rgba(255, 0, 110, 0.8)); }
            50% { filter: drop-shadow(0 0 40px rgba(0, 245, 212, 0.8)); }
        }

        .subtitle {
            font-size: 1.2rem;
            color: var(--secondary);
            margin-bottom: 3rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
        }

        .instructions {
            max-width: 500px;
            margin-bottom: 2rem;
            line-height: 1.8;
            color: rgba(255, 255, 255, 0.7);
        }

        .instructions span {
            color: var(--accent);
        }

        .start-btn {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            padding: 1rem 3rem;
            background: transparent;
            border: 3px solid var(--primary);
            color: var(--primary);
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .start-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
            transition: left 0.5s ease;
        }

        .start-btn:hover {
            background: var(--primary);
            color: var(--bg);
            box-shadow: 0 0 30px var(--primary);
            transform: scale(1.05);
        }

        .start-btn:hover::before {
            left: 100%;
        }

        .high-score-display {
            margin-top: 2rem;
            font-size: 1rem;
            color: var(--accent);
        }

        #game-screen {
            padding: 2rem;
        }

        .game-hud {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .stat {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: var(--surface);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            border: 1px solid rgba(0, 245, 212, 0.2);
        }

        .stat-icon {
            font-size: 1.2rem;
        }

        .stat-value {
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            color: var(--secondary);
        }

        .stat-label {
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
        }

        .timer-container {
            position: relative;
            width: 80px;
            height: 80px;
        }

        .timer-ring {
            transform: rotate(-90deg);
        }

        .timer-ring circle {
            fill: none;
            stroke-width: 6;
        }

        .timer-bg {
            stroke: var(--surface);
        }

        .timer-progress {
            stroke: var(--secondary);
            stroke-linecap: round;
            transition: stroke-dashoffset 1s linear, stroke 0.3s ease;
        }

        .timer-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
        }

        .timer-text.warning {
            color: var(--accent);
            animation: timerPulse 0.5s ease-in-out infinite;
        }

        .timer-text.danger {
            color: var(--error);
            animation: timerPulse 0.25s ease-in-out infinite;
        }

        @keyframes timerPulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.1); }
        }

        .combo-display {
            position: absolute;
            top: 100px;
            right: 2rem;
            text-align: center;
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .combo-display.visible {
            opacity: 1;
            transform: scale(1);
        }

        .combo-display.bump {
            animation: comboBump 0.3s ease;
        }

        @keyframes comboBump {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.3); }
        }

        .combo-multiplier {
            font-family: 'Orbitron', sans-serif;
            font-size: 3rem;
            font-weight: 900;
            color: var(--accent);
            text-shadow: 0 0 20px var(--accent);
        }

        .combo-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.5);
            letter-spacing: 0.2em;
        }

        .game-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2rem;
            margin-top: 100px;
        }

        .word-display {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(2rem, 8vw, 4rem);
            font-weight: 700;
            letter-spacing: 0.1em;
            display: flex;
            gap: 2px;
        }

        .char {
            display: inline-block;
            padding: 0.2rem;
            transition: all 0.1s ease;
        }

        .char.correct {
            color: var(--success);
            text-shadow: 0 0 10px var(--success);
        }

        .char.incorrect {
            color: var(--error);
            text-shadow: 0 0 10px var(--error);
            animation: charShake 0.2s ease;
        }

        .char.current {
            color: var(--secondary);
            border-bottom: 3px solid var(--secondary);
            animation: currentPulse 1s ease-in-out infinite;
        }

        .char.pending {
            color: rgba(255, 255, 255, 0.3);
        }

        @keyframes charShake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        @keyframes currentPulse {
            0%, 100% { border-color: var(--secondary); }
            50% { border-color: var(--accent); }
        }

        .word-display.completed {
            animation: wordComplete 0.4s ease;
        }

        @keyframes wordComplete {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); filter: drop-shadow(0 0 30px var(--success)); }
            100% { transform: scale(1); }
        }

        .input-container {
            position: relative;
            width: 100%;
            max-width: 400px;
        }

        .game-input {
            width: 100%;
            padding: 1rem 1.5rem;
            font-family: 'Share Tech Mono', monospace;
            font-size: 1.5rem;
            background: var(--surface);
            border: 2px solid var(--secondary);
            border-radius: 12px;
            color: var(--text);
            text-align: center;
            outline: none;
            box-shadow: 0 0 20px rgba(0, 245, 212, 0.2);
        }

        .game-input:focus {
            box-shadow: 0 0 30px rgba(0, 245, 212, 0.4);
        }

        .screen-flash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            opacity: 0;
            z-index: 999;
        }

        .screen-flash.error {
            background: var(--error);
            animation: flashError 0.2s ease;
        }

        @keyframes flashError {
            0% { opacity: 0.3; }
            100% { opacity: 0; }
        }

        .shake {
            animation: screenShake 0.3s ease;
        }

        @keyframes screenShake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-10px); }
            40% { transform: translateX(10px); }
            60% { transform: translateX(-10px); }
            80% { transform: translateX(10px); }
        }

        #results-screen {
            text-align: center;
        }

        .results-title {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(2rem, 8vw, 4rem);
            font-weight: 900;
            color: var(--primary);
            text-shadow: 0 0 30px var(--primary);
            margin-bottom: 1rem;
        }

        .final-score {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(4rem, 15vw, 8rem);
            font-weight: 900;
            background: linear-gradient(135deg, var(--accent), var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
        }

        .score-label {
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
            letter-spacing: 0.3em;
            margin-bottom: 2rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            max-width: 400px;
            margin: 0 auto 2rem;
        }

        .result-stat {
            background: var(--surface);
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px solid rgba(0, 245, 212, 0.2);
        }

        .result-stat-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            color: var(--secondary);
        }

        .result-stat-label {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
            margin-top: 0.3rem;
        }

        .performance-message {
            font-size: 1.2rem;
            margin-bottom: 2rem;
            padding: 1rem;
            border-radius: 8px;
            background: var(--surface);
        }

        .new-high-score {
            color: var(--accent);
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            animation: highScorePulse 1s ease-in-out infinite;
        }

        @keyframes highScorePulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .play-again-btn {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            font-weight: 700;
            padding: 1rem 2.5rem;
            background: var(--secondary);
            border: none;
            color: var(--bg);
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .play-again-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px var(--secondary);
        }

        .particle {
            position: fixed;
            pointer-events: none;
            border-radius: 50%;
            z-index: 100;
        }

        @media (max-width: 600px) {
            .game-hud {
                padding: 0.5rem 1rem;
            }

            .stat {
                padding: 0.3rem 0.6rem;
                font-size: 0.8rem;
            }

            .timer-container {
                width: 60px;
                height: 60px;
            }

            .timer-text {
                font-size: 1.2rem;
            }

            .combo-display {
                top: 80px;
                right: 1rem;
            }

            .combo-multiplier {
                font-size: 2rem;
            }

            .game-area {
                margin-top: 80px;
            }

            .stats-grid {
                grid-template-columns: 1fr 1fr;
                gap: 0.5rem;
            }

            .result-stat {
                padding: 1rem;
            }

            .result-stat-value {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="grid-bg"></div>
    <div class="screen-flash" id="screen-flash"></div>

    <div class="screen active" id="start-screen">
        <h1 class="title">TypeRacer</h1>
        <p class="subtitle">Arena</p>
        <p class="instructions">
            Type the words as fast as you can!<br>
            Build <span>combos</span> for bonus points.<br>
            You have <span>60 seconds</span>. Let's go!
        </p>
        <button class="start-btn" id="start-btn">Start</button>
        <p class="high-score-display" id="high-score-display"></p>
    </div>

    <div class="screen" id="game-screen">
        <div class="game-hud">
            <div class="stat">
                <span class="stat-icon">⚡</span>
                <div>
                    <div class="stat-value" id="wpm-display">0</div>
                    <div class="stat-label">WPM</div>
                </div>
            </div>
            <div class="stat">
                <span class="stat-icon">🎯</span>
                <div>
                    <div class="stat-value" id="accuracy-display">100%</div>
                    <div class="stat-label">Accuracy</div>
                </div>
            </div>
            <div class="timer-container">
                <svg class="timer-ring" width="80" height="80">
                    <circle class="timer-bg" cx="40" cy="40" r="35"></circle>
                    <circle class="timer-progress" id="timer-progress" cx="40" cy="40" r="35" 
                        stroke-dasharray="220" stroke-dashoffset="0"></circle>
                </svg>
                <span class="timer-text" id="timer-display">60</span>
            </div>
            <div class="stat">
                <span class="stat-icon">📝</span>
                <div>
                    <div class="stat-value" id="words-display">0</div>
                    <div class="stat-label">Words</div>
                </div>
            </div>
            <div class="stat">
                <span class="stat-icon">🏆</span>
                <div>
                    <div class="stat-value" id="score-display">0</div>
                    <div class="stat-label">Score</div>
                </div>
            </div>
        </div>

        <div class="combo-display" id="combo-display">
            <div class="combo-multiplier" id="combo-multiplier">1x</div>
            <div class="combo-label">Combo</div>
        </div>

        <div class="game-area">
            <div class="word-display" id="word-display"></div>
            <div class="input-container">
                <input type="text" class="game-input" id="game-input" autocomplete="off" autocapitalize="off" spellcheck="false">
            </div>
        </div>
    </div>

    <div class="screen" id="results-screen">
        <h2 class="results-title">Game Over</h2>
        <div class="final-score" id="final-score">0</div>
        <div class="score-label">Final Score</div>
        
        <div class="stats-grid">
            <div class="result-stat">
                <div class="result-stat-value" id="final-wpm">0</div>
                <div class="result-stat-label">WPM</div>
            </div>
            <div class="result-stat">
                <div class="result-stat-value" id="final-accuracy">0%</div>
                <div class="result-stat-label">Accuracy</div>
            </div>
            <div class="result-stat">
                <div class="result-stat-value" id="final-words">0</div>
                <div class="result-stat-label">Words</div>
            </div>
            <div class="result-stat">
                <div class="result-stat-value" id="final-combo">0x</div>
                <div class="result-stat-label">Best Combo</div>
            </div>
        </div>

        <div class="performance-message" id="performance-message"></div>
        <button class="play-again-btn" id="play-again-btn">Play Again</button>
    </div>

    <script>
        const WORDS = {
            easy: [
                'the', 'and', 'for', 'are', 'but', 'not', 'you', 'all', 'can', 'her',
                'was', 'one', 'our', 'out', 'day', 'get', 'has', 'him', 'his', 'how',
                'its', 'may', 'new', 'now', 'old', 'see', 'two', 'way', 'who', 'boy',
                'did', 'own', 'say', 'she', 'too', 'use', 'run', 'fly', 'big', 'red',
                'sun', 'top', 'cat', 'dog', 'hat', 'map', 'pen', 'cup', 'box', 'fox',
                'six', 'ten', 'hot', 'fog', 'jam', 'key', 'leg', 'mud', 'nut', 'oak',
                'pan', 'ray', 'sky', 'tea', 'van', 'web', 'yes', 'zip', 'zoo', 'art'
            ],
            medium: [
                'about', 'after', 'again', 'being', 'could', 'every', 'first', 'found',
                'great', 'house', 'large', 'learn', 'never', 'other', 'place', 'plant',
                'point', 'right', 'small', 'sound', 'spell', 'still', 'study', 'their',
                'there', 'these', 'thing', 'think', 'three', 'water', 'where', 'which',
                'world', 'would', 'write', 'black', 'bring', 'class', 'close', 'color',
                'drive', 'earth', 'equal', 'field', 'final', 'floor', 'force', 'front',
                'green', 'group', 'heavy', 'human', 'known', 'laugh', 'light', 'money',
                'music', 'night', 'north', 'order', 'paper', 'peace', 'power', 'press'
            ],
            hard: [
                'absolute', 'beautiful', 'challenge', 'dangerous', 'education', 'fantastic',
                'gregarious', 'happiness', 'illuminate', 'javascript', 'knowledge', 'landscape',
                'magnificent', 'nightmare', 'opportunity', 'philosophy', 'quarantine', 'remarkable',
                'situation', 'temperature', 'understand', 'vegetable', 'wonderful', 'xylophone',
                'yesterday', 'architecture', 'bureaucracy', 'championship', 'demonstrate',
                'encyclopedia', 'fluorescent', 'geographical', 'hemorrhage', 'intelligence',
                'journalism', 'kindergarten', 'laboratory', 'mathematics', 'neighborhood',
                'organization', 'photography', 'questionnaire', 'revolutionary', 'sustainability',
                'transportation', 'unconscious', 'visualization', 'acknowledgment', 'biotechnology'
            ]
        };

        class TypingGame {
            constructor() {
                this.screens = {
                    start: document.getElementById('start-screen'),
                    game: document.getElementById('game-screen'),
                    results: document.getElementById('results-screen')
                };
                
                this.elements = {
                    startBtn: document.getElementById('start-btn'),
                    highScoreDisplay: document.getElementById('high-score-display'),
                    gameInput: document.getElementById('game-input'),
                    wordDisplay: document.getElementById('word-display'),
                    wpmDisplay: document.getElementById('wpm-display'),
                    accuracyDisplay: document.getElementById('accuracy-display'),
                    timerDisplay: document.getElementById('timer-display'),
                    timerProgress: document.getElementById('timer-progress'),
                    wordsDisplay: document.getElementById('words-display'),
                    scoreDisplay: document.getElementById('score-display'),
                    comboDisplay: document.getElementById('combo-display'),
                    comboMultiplier: document.getElementById('combo-multiplier'),
                    screenFlash: document.getElementById('screen-flash'),
                    finalScore: document.getElementById('final-score'),
                    finalWpm: document.getElementById('final-wpm'),
                    finalAccuracy: document.getElementById('final-accuracy'),
                    finalWords: document.getElementById('final-words'),
                    finalCombo: document.getElementById('final-combo'),
                    performanceMessage: document.getElementById('performance-message'),
                    playAgainBtn: document.getElementById('play-again-btn')
                };

                this.timerRadius = 35;
                this.timerCircumference = 2 * Math.PI * this.timerRadius;
                this.elements.timerProgress.style.strokeDasharray = this.timerCircumference;
                
                this.highScore = parseInt(localStorage.getItem('typingGameHighScore')) || 0;
                this.updateHighScoreDisplay();
                
                this.bindEvents();
            }

            bindEvents() {
                this.elements.startBtn.addEventListener('click', () => this.startGame());
                this.elements.playAgainBtn.addEventListener('click', () => this.startGame());
                this.elements.gameInput.addEventListener('input', (e) => this.handleInput(e));
                document.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' && this.screens.start.classList.contains('active')) {
                        this.startGame();
                    }
                });
            }

            updateHighScoreDisplay() {
                if (this.highScore > 0) {
                    this.elements.highScoreDisplay.textContent = `High Score: ${this.highScore}`;
                }
            }

            showScreen(screenName) {
                Object.values(this.screens).forEach(screen => screen.classList.remove('active'));
                this.screens[screenName].classList.add('active');
            }

            startGame() {
                this.score = 0;
                this.wordsCompleted = 0;
                this.combo = 0;
                this.bestCombo = 0;
                this.correctChars = 0;
                this.totalChars = 0;
                this.currentWord = '';
                this.usedWords = new Set();
                this.wordStartTime = 0;
                this.gameStartTime = 0;
                this.timeRemaining = 60;
                this.isPlaying = true;

                this.updateDisplay();
                this.elements.gameInput.value = '';
                this.elements.gameInput.focus();
                this.showScreen('game');
                
                this.gameStartTime = Date.now();
                this.nextWord();
                this.startTimer();
            }

            getWordList() {
                if (this.score < 500) return WORDS.easy;
                if (this.score < 1500) return WORDS.medium;
                return WORDS.hard;
            }

            nextWord() {
                const wordList = this.getWordList();
                const availableWords = wordList.filter(w => !this.usedWords.has(w));
                
                if (availableWords.length === 0) {
                    this.usedWords.clear();
                    return this.getWordList()[Math.floor(Math.random() * this.getWordList().length)];
                }
                
                const word = availableWords[Math.floor(Math.random() * availableWords.length)];
                this.usedWords.add(word);
                this.currentWord = word;
                this.wordStartTime = Date.now();
                this.renderWord();
            }

            renderWord() {
                this.elements.wordDisplay.innerHTML = '';
                for (let i = 0; i < this.currentWord.length; i++) {
                    const span = document.createElement('span');
                    span.className = 'char' + (i === 0 ? ' current' : ' pending');
                    span.textContent = this.currentWord[i];
                    this.elements.wordDisplay.appendChild(span);
                }
            }

            handleInput(e) {
                if (!this.isPlaying) return;

                const typed = e.target.value;
                const chars = this.elements.wordDisplay.querySelectorAll('.char');
                
                this.totalChars++;
                
                for (let i = 0; i < this.currentWord.length; i++) {
                    chars[i].className = 'char';
                    
                    if (i < typed.length) {
                        if (typed[i] === this.currentWord[i]) {
                            chars[i].classList.add('correct');
                            this.correctChars++;
                        } else {
                            chars[i].classList.add('incorrect');
                            this.handleError();
                            return;
                        }
                    } else if (i === typed.length) {
                        chars[i].classList.add('current');
                    } else {
                        chars[i].classList.add('pending');
                    }
                }

                if (typed === this.currentWord) {
                    this.wordComplete();
                }
            }

            handleError() {
                this.combo = 0;
                this.updateCombo();
                this.flashScreen();
                this.shakeScreen();
                
                setTimeout(() => {
                    if (this.isPlaying) {
                        this.elements.gameInput.value = '';
                        this.renderWord();
                    }
                }, 200);
            }

            wordComplete() {
                const timeTaken = (Date.now() - this.wordStartTime) / 1000;
                this.wordsCompleted++;
                this.combo++;
                
                if (this.combo > this.bestCombo) this.bestCombo = this.combo;
                
                let points = this.currentWord.length * 10;
                
                if (this.combo >= 10) points *= 4;
                else if (this.combo >= 5) points *= 3;
                else if (this.combo >= 3) points *= 2;
                
                if (timeTaken < 1) points += 20;
                
                this.score += points;
                
                this.elements.wordDisplay.classList.add('completed');
                setTimeout(() => {
                    this.elements.wordDisplay.classList.remove('completed');
                }, 400);
                
                if (this.combo > 1 && this.combo % 5 === 0) {
                    this.spawnParticles();
                }
                
                this.updateCombo();
                this.updateDisplay();
                this.elements.gameInput.value = '';
                this.nextWord();
            }

            updateCombo() {
                const comboDisplay = this.elements.comboDisplay;
                const multiplier = this.elements.comboMultiplier;
                
                if (this.combo >= 2) {
                    comboDisplay.classList.add('visible');
                    comboDisplay.classList.add('bump');
                    setTimeout(() => comboDisplay.classList.remove('bump'), 300);
                    
                    let mult = 1;
                    if (this.combo >= 10) mult = 4;
                    else if (this.combo >= 5) mult = 3;
                    else if (this.combo >= 3) mult = 2;
                    
                    multiplier.textContent = mult + 'x';
                } else {
                    comboDisplay.classList.remove('visible');
                }
            }

            updateDisplay() {
                const elapsed = (Date.now() - this.gameStartTime) / 1000;
                const wpm = elapsed > 0.5 ? Math.round((this.correctChars / 5) / (elapsed / 60)) : 0;
                
                this.elements.wpmDisplay.textContent = wpm;
                this.elements.wordsDisplay.textContent = this.wordsCompleted;
                this.elements.scoreDisplay.textContent = this.score;
                
                const accuracy = this.totalChars > 0 
                    ? Math.round((this.correctChars / this.totalChars) * 100) 
                    : 100;
                this.elements.accuracyDisplay.textContent = accuracy + '%';
            }

            startTimer() {
                this.timerInterval = setInterval(() => {
                    this.timeRemaining--;
                    this.elements.timerDisplay.textContent = this.timeRemaining;
                    
                    const progress = this.timeRemaining / 60;
                    const offset = this.timerCircumference * (1 - progress);
                    this.elements.timerProgress.style.strokeDashoffset = offset;
                    
                    this.elements.timerDisplay.classList.remove('warning', 'danger');
                    this.elements.timerProgress.style.stroke = 'var(--secondary)';
                    
                    if (this.timeRemaining <= 10) {
                        this.elements.timerDisplay.classList.add('danger');
                        this.elements.timerProgress.style.stroke = 'var(--error)';
                    } else if (this.timeRemaining <= 20) {
                        this.elements.timerDisplay.classList.add('warning');
                        this.elements.timerProgress.style.stroke = 'var(--accent)';
                    }
                    
                    this.updateDisplay();
                    
                    if (this.timeRemaining <= 0) {
                        this.endGame();
                    }
                }, 1000);
            }

            flashScreen() {
                this.elements.screenFlash.classList.add('error');
                setTimeout(() => {
                    this.elements.screenFlash.classList.remove('error');
                }, 200);
            }

            shakeScreen() {
                this.screens.game.classList.add('shake');
                setTimeout(() => {
                    this.screens.game.classList.remove('shake');
                }, 300);
            }

            spawnParticles() {
                const colors = ['#ff006e', '#00f5d4', '#fee440', '#00ff88'];
                const rect = this.elements.wordDisplay.getBoundingClientRect();
                const centerX = rect.left + rect.width / 2;
                const centerY = rect.top + rect.height / 2;
                
                for (let i = 0; i < 12; i++) {
                    const particle = document.createElement('div');
                    particle.className = 'particle';
                    particle.style.left = centerX + 'px';
                    particle.style.top = centerY + 'px';
                    particle.style.width = '10px';
                    particle.style.height = '10px';
                    particle.style.background = colors[Math.floor(Math.random() * colors.length)];
                    particle.style.boxShadow = `0 0 10px ${particle.style.background}`;
                    
                    const angle = (Math.PI * 2 * i) / 12;
                    const velocity = 100 + Math.random() * 100;
                    const dx = Math.cos(angle) * velocity;
                    const dy = Math.sin(angle) * velocity;
                    
                    document.body.appendChild(particle);
                    
                    particle.animate([
                        { transform: 'translate(0, 0) scale(1)', opacity: 1 },
                        { transform: `translate(${dx}px, ${dy}px) scale(0)`, opacity: 0 }
                    ], {
                        duration: 600,
                        easing: 'cubic-bezier(0, 0, 0.2, 1)'
                    }).onfinish = () => particle.remove();
                }
            }

            endGame() {
                this.isPlaying = false;
                clearInterval(this.timerInterval);
                
                const elapsed = (Date.now() - this.gameStartTime) / 1000;
                const finalWpm = elapsed > 0 ? Math.round((this.correctChars / 5) / (elapsed / 60)) : 0;
                const finalAccuracy = this.totalChars > 0 
                    ? Math.round((this.correctChars / this.totalChars) * 100) 
                    : 0;
                
                this.animateNumber(this.elements.finalScore, this.score);
                this.elements.finalWpm.textContent = finalWpm;
                this.elements.finalAccuracy.textContent = finalAccuracy + '%';
                this.elements.finalWords.textContent = this.wordsCompleted;
                this.elements.finalCombo.textContent = this.bestCombo + 'x';
                
                let message = '';
                let messageColor = 'var(--text)';
                
                if (finalWpm >= 80) {
                    message = 'Incredible! You type faster than a cheetah on caffeine!';
                    messageColor = 'var(--accent)';
                } else if (finalWpm >= 60) {
                    message = 'Excellent! Your fingers are basically lightning!';
                    messageColor = 'var(--success)';
                } else if (finalWpm >= 40) {
                    message = 'Great job! You\'re getting seriously good at this!';
                    messageColor = 'var(--secondary)';
                } else if (finalWpm >= 20) {
                    message = 'Good effort! Keep practicing and you\'ll be a pro!';
                    messageColor = 'var(--primary)';
                } else {
                    message = 'Nice try! Every master was once a beginner!';
                    messageColor = 'var(--text)';
                }
                
                this.elements.performanceMessage.textContent = message;
                this.elements.performanceMessage.style.color = messageColor;
                
                if (this.score > this.highScore) {
                    this.highScore = this.score;
                    localStorage.setItem('typingGameHighScore', this.highScore);
                    this.updateHighScoreDisplay();
                    this.elements.performanceMessage.innerHTML += '<br><span class="new-high-score">New High Score!</span>';
                }
                
                this.showScreen('results');
            }

            animateNumber(element, target) {
                const duration = 1000;
                const start = Date.now();
                const startValue = 0;
                
                const animate = () => {
                    const elapsed = Date.now() - start;
                    const progress = Math.min(elapsed / duration, 1);
                    const easeOut = 1 - Math.pow(1 - progress, 3);
                    const current = Math.round(startValue + (target - startValue) * easeOut);
                    element.textContent = current;
                    
                    if (progress < 1) {
                        requestAnimationFrame(animate);
                    }
                };
                
                animate();
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            new TypingGame();
        });
    </script>
</body>
